version: "3.9"

services:
  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    restart: unless-stopped
    entrypoint: []
    expose:
      - "8001"

  backend:
    build:
      context: ./backend
    container_name: ocr-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - ocr-service

  frontend:
    build:
      context: ./frontend
    container_name: ocr-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  docker-sample:
    build:
      context: ./docker-sample
    container_name: docker-sample-nginx
    restart: unless-stopped
    ports:
      - "8090:80"

  example-api:
    build:
      context: ./example
    container_name: example-fastapi
    restart: unless-stopped
    ports:
      - "8002:8002"
