<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR Web App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>OCR Web App</h1>
      <p>이미지를 업로드해 한글/영문 OCR 텍스트를 추출합니다.</p>

      <form id="ocr-form">
        <label>Backend URL
          <input id="backend-url-input" type="url" value="http://localhost:8000" required />
        </label>

        <label>이미지 파일
          <input id="file-input" type="file" accept="image/*" required />
        </label>
        <p id="file-meta" class="meta">선택된 파일이 없습니다.</p>

        <label>언어 (Tesseract)
          <input id="lang-input" type="text" value="kor+eng" />
        </label>

        <div class="actions">
          <button type="submit">OCR 실행</button>
          <button id="copy-btn" type="button" class="secondary" disabled>결과 복사</button>
        </div>
      </form>

      <section>
        <h2>결과</h2>
        <pre id="result">아직 결과가 없습니다.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
