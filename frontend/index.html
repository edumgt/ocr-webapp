<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR Demo (Vanilla JS)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>OCR Demo</h1>
      <p>이미지를 업로드하면 FastAPI가 OCR 컨테이너로 전달해 텍스트를 추출합니다.</p>

      <form id="ocr-form">
        <label>이미지 파일
          <input id="file-input" type="file" accept="image/*" required />
        </label>

        <label>언어 (Tesseract)
          <input id="lang-input" type="text" value="kor+eng" />
        </label>

        <button type="submit">OCR 실행</button>
      </form>

      <section>
        <h2>결과</h2>
        <pre id="result">아직 결과가 없습니다.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
